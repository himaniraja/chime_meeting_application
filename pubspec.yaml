name: chime_meeting_app
description: "Video meeting app using Amazon Chime SDK"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  dio: ^5.7.0
  flutter_dotenv: ^6.0.0
  equatable: ^2.0.7
  permission_handler: ^12.0.1
  flutter_aws_chime:
    path: lib/plugins/flutter_aws_chime
  uuid: ^4.5.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
